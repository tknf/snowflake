name: ci
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["*"]
    paths-ignore:
      - "docs/**"
      - ".vscode/**"
      - "README.md"
      - ".gitignore"
      - "LICENSE"

jobs:
  main:
    name: "Main"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
      - run: vp install
      - run: vp pack
      - run: vp check

  coverage:
    name: "Coverage"
    runs-on: ubuntu-latest
    needs: [main]
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
      - run: vp install
      - run: vp test run --coverage
