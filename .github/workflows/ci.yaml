name: ci
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["*"]
    paths-ignore:
      - "docs/**"
      - ".vscode/**"
      - "README.md"
      - ".gitignore"
      - "LICENSE"

permissions:
  contents: read

jobs:
  main:
    name: "Main"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: voidzero-dev/setup-vp@13e7afb99c66525824db54e107d667216e795d37 # v1.14.0
        with:
          cache: true
      - run: vp install
      - run: vp pack
      - run: vp check

  coverage:
    name: "Coverage"
    runs-on: ubuntu-latest
    needs: [main]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: voidzero-dev/setup-vp@13e7afb99c66525824db54e107d667216e795d37 # v1.14.0
        with:
          cache: true
      - run: vp install
      - run: vp test run --coverage
